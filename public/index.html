<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Что купить сейчас · Binance scanner</title>
    <style>
      :root {
        --bg: #0b0d12;
        --bg-elev: #141821;
        --bg-card: #171c27;
        --border: #222838;
        --text: #e7ecf5;
        --muted: #8a93a6;
        --accent: #6ea8ff;
        --long: #16c784;
        --short: #ea3943;
        --long-bg: rgba(22, 199, 132, 0.12);
        --short-bg: rgba(234, 57, 67, 0.12);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: radial-gradient(1200px 600px at 10% -10%, #1a2030 0%, var(--bg) 60%) fixed;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      .container {
        max-width: 1040px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }
      header h1 {
        margin: 0 0 8px 0;
        font-size: clamp(28px, 4vw, 40px);
        letter-spacing: -0.02em;
      }
      header p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 28px 0 24px;
        flex-wrap: wrap;
      }
      button.primary {
        background: linear-gradient(180deg, #2f6bff 0%, #1f4ed8 100%);
        color: white;
        border: 0;
        padding: 12px 18px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 6px 20px rgba(31, 78, 216, 0.35);
        transition: transform 0.05s ease, filter 0.15s ease;
      }
      button.primary:hover { filter: brightness(1.08); }
      button.primary:active { transform: translateY(1px); }
      button.primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        filter: grayscale(0.3);
      }
      .status {
        color: var(--muted);
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 18px 16px;
        transition: transform 0.1s ease, border-color 0.15s ease;
      }
      .card:hover { border-color: #2d3548; transform: translateY(-1px); }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .symbol {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .badge {
        font-size: 12px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        letter-spacing: 0.08em;
      }
      .badge.long {
        color: var(--long);
        background: var(--long-bg);
        border: 1px solid rgba(22, 199, 132, 0.3);
      }
      .badge.short {
        color: var(--short);
        background: var(--short-bg);
        border: 1px solid rgba(234, 57, 67, 0.3);
      }
      .price-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 14px;
      }
      .price {
        font-size: 22px;
        font-weight: 700;
      }
      .change {
        font-size: 14px;
        font-weight: 600;
      }
      .change.up { color: var(--long); }
      .change.down { color: var(--short); }
      .rows {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 14px;
        margin-bottom: 12px;
      }
      .rows .cell {
        background: var(--bg-elev);
        border-radius: 8px;
        padding: 8px 10px;
        border: 1px solid var(--border);
      }
      .cell .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 2px;
      }
      .cell .value {
        font-size: 14px;
        font-weight: 600;
      }
      .reason {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.45;
        margin-top: 6px;
      }
      .empty, .error {
        text-align: center;
        padding: 40px 24px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--bg-card);
      }
      .error {
        border-color: rgba(234, 57, 67, 0.4);
        background: rgba(234, 57, 67, 0.08);
      }
      .error h3 { margin: 0 0 6px; color: var(--short); }
      .empty h3 { margin: 0 0 6px; }
      .error p, .empty p { margin: 0; color: var(--muted); }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: inline-block;
        vertical-align: -3px;
        margin-right: 6px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      footer {
        margin-top: 32px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Что купить сейчас</h1>
        <p>Binance scanner · находит свежие идеи LONG и SHORT по данным с Binance 24h ticker</p>
      </header>

      <div class="controls">
        <button id="refresh" class="primary">Найти сигнал</button>
        <div class="status" id="status"></div>
      </div>

      <div id="content"></div>

      <footer>
        Данные: Binance · не финансовая рекомендация. Используйте стопы.
      </footer>
    </div>

    <script>
      const btn = document.getElementById("refresh");
      const statusEl = document.getElementById("status");
      const content = document.getElementById("content");

      function fmtNum(n, digits) {
        if (n === null || n === undefined || !isFinite(n)) return "—";
        const d = digits ?? (Math.abs(n) >= 100 ? 2 : Math.abs(n) >= 1 ? 4 : Math.abs(n) >= 0.01 ? 6 : 8);
        return Number(n).toLocaleString("en-US", {
          minimumFractionDigits: 2,
          maximumFractionDigits: d,
        });
      }
      function fmtMoney(n) {
        if (!isFinite(n)) return "—";
        if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
        if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
        if (n >= 1e3) return "$" + (n / 1e3).toFixed(1) + "K";
        return "$" + n.toFixed(0);
      }
      function fmtPct(n) {
        if (!isFinite(n)) return "—";
        const sign = n > 0 ? "+" : "";
        return sign + n.toFixed(2) + "%";
      }

      function renderIdeas(data) {
        const ideas = data.ideas || [];
        if (!ideas.length) {
          content.innerHTML = `
            <div class="empty">
              <h3>Сейчас подходящих сигналов не найдено</h3>
              <p>Рынок слишком спокойный — попробуйте позже.</p>
            </div>`;
          return;
        }
        const cards = ideas.map((i) => {
          const sideClass = i.side === "LONG" ? "long" : "short";
          const changeClass = i.change24h >= 0 ? "up" : "down";
          return `
            <article class="card">
              <div class="card-header">
                <div class="symbol">${i.symbol}</div>
                <div class="badge ${sideClass}">${i.side}</div>
              </div>
              <div class="price-row">
                <div class="price">${fmtNum(i.lastPrice)}</div>
                <div class="change ${changeClass}">${fmtPct(i.change24h)}</div>
              </div>
              <div class="rows">
                <div class="cell"><div class="label">Вход</div><div class="value">${fmtNum(i.entry)}</div></div>
                <div class="cell"><div class="label">Стоп</div><div class="value">${fmtNum(i.stop)}</div></div>
                <div class="cell"><div class="label">Цель</div><div class="value">${fmtNum(i.target)}</div></div>
                <div class="cell"><div class="label">Оборот 24ч</div><div class="value">${fmtMoney(i.turnover24h)}</div></div>
              </div>
              <div class="reason">${i.reason}</div>
            </article>`;
        }).join("");
        content.innerHTML = `<div class="grid">${cards}</div>`;
      }

      function renderError(message) {
        content.innerHTML = `
          <div class="error">
            <h3>Не удалось получить данные</h3>
            <p>${message || "Binance API сейчас недоступен. Попробуйте через минуту."}</p>
          </div>`;
      }

      async function loadIdeas() {
        btn.disabled = true;
        statusEl.innerHTML = '<span class="spinner"></span>Сканируем Binance...';
        try {
          const res = await fetch("/api/ideas", { cache: "no-store" });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) {
            renderError(data.error);
            statusEl.textContent = "Ошибка загрузки";
            return;
          }
          renderIdeas(data);
          const t = new Date(data.updatedAt);
          statusEl.textContent = "Обновлено: " + t.toLocaleTimeString();
        } catch (err) {
          renderError(err && err.message);
          statusEl.textContent = "Ошибка сети";
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", loadIdeas);
      loadIdeas();
    </script>
  </body>
</html>
