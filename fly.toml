app = "crypto-scalper"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]

[env]
  SCALPER_DATA_DIR = "/data"
  PORT = "8080"
  SCALPER_RESET_ON_START = "1"

[[mounts]]
  source = "scalper_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
